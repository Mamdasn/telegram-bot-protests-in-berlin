name: Dockerhub Publish & Deploy on Host

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - '.github/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  build-and-push-to-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push arm64/amd64
        run: |
          docker buildx bake --push --file docker-compose.yml \
            --set *.platform=linux/amd64,linux/arm64/v8

  deploy-on-host:
    runs-on: self-hosted
    needs: [build-and-push-to-dockerhub]
    steps:
    - name: Checkout repository (with submodules)
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Deploy to Self-Hosted
      env:
        TG_BOT_TOKEN: ${{secrets.TG_BOT_TOKEN}}
        DB_UPDATE_PERIOD: ${{secrets.DB_UPDATE_PERIOD}}
        IP_ADDRESS: ${{secrets.IP_HOST}}
        SSL_PORT: ${{secrets.SSL_PORT}}
      run: |
        set -euo pipefail
        export TG_BOT_TOKEN="$TG_BOT_TOKEN"
        export DB_UPDATE_PERIOD="$DB_UPDATE_PERIOD"
        export IP_ADDRESS="$IP_ADDRESS"
        export SSL_PORT="$SSL_PORT"

        docker compose down
        docker rm -f $(docker compose ps -aq) || true
        docker compose up --build -d

        echo "Containers status:"
        docker compose ps

        expected_services="$(docker compose config --services | wc -l)"
        running_services="$(docker compose ps --services --filter status=running | wc -l)"
        if [ "$running_services" -ne "$expected_services" ]; then
          echo "Not all services are running ($running_services/$expected_services)."
          echo "Detailed status:"
          docker compose ps
          exit 1
        fi

        echo "All docker compose services are running."
